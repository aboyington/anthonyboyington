  <body>
    <main class="main-page-content">
      <!-- ================================ MENUBAR =============================== -->

        <div class="menubar-content">
          <nav class="navbar navbar-default navbar-fixed-top">
            <div class="container">
              <div class="row">
                <div class="col-lg-2 col-md-2 col-sm-2">
                  <div class="site-title">
                    <h3><a href="index.html">Rohan Anthony</a></h3>
                  </div>
                </div>
                <div class="navbar-header">
                  <button
                    type="button"
                    class="navbar-toggle collapsed"
                    data-toggle="collapse"
                    data-target="#bs-example-navbar-collapse-1"

      <!-- ================================ SCROLL TO TOP =============================== -->
      <div class="scrolltop">
        <div class="scroll icon">
          <a href="#home"><i class="fa fa-4x fa-angle-up topicon"></i></a>
        </div>
      </div>

      <!-- ================================ CONTACT =============================== -->
      <section id="contact">
        <div id="contact-content">
          <div class="contact-grid">
            <div class="contact-form-details">
              <div class="container">
                <div class="row">
                  <div class="col-lg-12 col-md-12">
                    <div class="main-title text-center">
                      <h3>Contact Me</h3>
                      <div class="underline1"></div>
                      <!-- <div class="underline1 no-margin"></div> -->
                      <p>
                        Let’s chat! You can contact me directly at<br />
                        <a href="">hello@anthonyboyington.com</a><br />
                        or use the form below.
                      </p>
                    </div>
                  </div>
                </div>
                <div class="row tips-row">
                  <div class="col-lg-12 col-md-12 col-sm-12 contact-col">
                    <div class="contact-form1 wow fadeIn">
                      <form
                        name="contact"
                        method="POST"
                        data-netlify="true"
                        id="contactForm"
                        class="contact-form shake"
                        data-toggle="validator"
                      >
                        <div class="form-group">
                          <div class="controls">
                            <input
                              type="text"
                              id="name"
                              name="name"
                              class="form-control"
                              placeholder="Name"
                              required
                              data-error="Please enter your name"
                            />
                            <div class="help-block with-errors"></div>
                          </div>
                          <!-- end controls -->
                        </div>
                        <!-- end form-group -->
                        <div class="form-group">
                          <div class="controls">
                            <input
                              type="email"
                              class="email form-control"
                              id="email"
                              name="email"
                              placeholder="Email"
                              required
                              data-error="Please enter your email"
                            />
                            <div class="help-block with-errors"></div>
                          </div>
                          <!-- end controls -->
                        </div>
                        <!-- end form-group -->
                        <div class="form-group">
                          <div class="controls">
                            <input
                              type="text"
                              id="msg_subject"
                              class="form-control"
                              name="subject"
                              placeholder="Subject"
                              required
                              data-error="Please enter your message subject"
                            />
                            <div class="help-block with-errors"></div>
                          </div>
                          <!-- end controls -->
                        </div>
                        <!-- end form-group -->
                        <div class="form-group">
                          <div class="controls">
                            <textarea
                              id="message"
                              rows="7"
                              name="message"
                              placeholder="Message"
                              class="form-control"
                              required
                              data-error="Write your message"
                            ></textarea>
                            <div class="help-block with-errors"></div>
                          </div>
                        </div>
                        <button
                          type="submit"
                          id="submit"
                          class="btn btn-success"
                        >
                          Submit
                        </button>
                        <div id="msgSubmit" class="h3 text-center hidden"></div>
                        <div class="clearfix"></div>
                      </form>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- ================================ FOOTER =============================== -->
      <footer class="copyright-details">

    <script src="js/jquery.fancybox-media.js?v=1.0.6"></script>
    <script src="js/jquery.fancybox.pack.js?v=2.1.5"></script>
    <script src="js/fancybox.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>

    <!-- Load More Script -->
    <script>
      $(document).ready(function () {
        $('.content-lm').slice(0, 4).show();
        $('#loadMore').on('click', function (e) {
          e.preventDefault();
          $('.content-lm:hidden').slice(0, 4).slideDown();
          if ($('.content-lm:hidden').length == 0) {
            $('#loadMore').text('End').addClass('noContent');
          }
        });
      });
    </script>
  </body>
